<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Pong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a4a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #ui {
    color: #fff;
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 12px;
    letter-spacing: 4px;
    text-shadow: 2px 2px 4px #000;
  }
  #canvas {
    border: 4px solid #fff;
    border-radius: 4px;
    display: block;
    background: #2d6a2d;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
  }
  #instructions {
    color: #cce5cc;
    font-size: 13px;
    margin-top: 10px;
    text-align: center;
    line-height: 1.8;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: 'Courier New', monospace;
    text-align: center;
  }
  #overlay h1 { font-size: 42px; margin-bottom: 8px; text-shadow: 3px 3px 6px #000; }
  .subtitle { font-size: 15px; color: #cce5cc; margin-bottom: 28px; }
  .mode-btns { display: flex; gap: 20px; margin-bottom: 24px; }
  .mode-btn {
    padding: 16px 32px;
    font-size: 18px;
    font-family: 'Courier New', monospace;
    background: transparent;
    color: #fff;
    border: 2px solid #fff;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 1px;
    min-width: 180px;
  }
  .mode-btn:hover, .mode-btn.selected { background: #fff; color: #1a4a1a; }
  .controls-box {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 14px 28px;
    font-size: 13px;
    color: #cce5cc;
    line-height: 2.2;
    margin-bottom: 20px;
    min-width: 360px;
  }
  .key { color: #ffe; font-weight: bold; }
  .start-btn {
    padding: 12px 48px;
    font-size: 20px;
    font-family: 'Courier New', monospace;
    background: #fff;
    color: #1a4a1a;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 2px;
  }
  .start-btn:hover { background: #cce5cc; }
  .ghost-btn {
    padding: 12px 36px;
    font-size: 18px;
    font-family: 'Courier New', monospace;
    background: transparent;
    color: #fff;
    border: 2px solid #fff;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 2px;
  }
  .ghost-btn:hover { background: rgba(255,255,255,0.1); }
</style>
</head>
<body>

<div id="ui"><span id="score1">0</span> — <span id="score2">0</span></div>
<canvas id="canvas" width="800" height="480"></canvas>
<div id="instructions"></div>
<div style="margin-top: 12px;">
    <a href="fromScratch.html" style="display: inline-block; padding: 8px 24px; background: #ffffff; color: #1a4a1a; border: 2px solid #ffffff; border-radius: 6px; font-family: Courier New, monospace; font-size: 13px; text-decoration: none; font-weight: bold; letter-spacing: 1px;">← Back to Tennis Page</a>
</div>
<div id="overlay">
  <h1>🎾 Tennis Pong</h1>
  <p class="subtitle">Better timing = faster ball &nbsp;|&nbsp; First to 7 wins</p>
  <div class="mode-btns">
    <button class="mode-btn selected" id="btn-cpu" onclick="selectMode('cpu')">vs Computer</button>
    <button class="mode-btn" id="btn-2p" onclick="selectMode('2p')">2 Players</button>
  </div>
  <div class="controls-box" id="controls-display">
    <div><span class="key">↑ ↓</span> &nbsp; Move &nbsp;&nbsp;&nbsp; <span class="key">SPACE</span> &nbsp; Swing</div>
  </div>
  <button class="start-btn" onclick="startGame()">PLAY</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const instrEl = document.getElementById('instructions');

const W = canvas.width, H = canvas.height;
const PLAYER_W = 14, PLAYER_H = 80;
const BALL_R = 10;
const WIN_SCORE = 7;
const PADDLE_SPEED = 5;

let gameMode = 'cpu';
let gameRunning = false;
let loopStarted = false;
let scores = [0, 0];
let ball, players, serving, gameOver;
let feedbacks = [];
let keys = {};
let lastSwingTime = [0, 0];

function selectMode(mode) {
  gameMode = mode;
  document.getElementById('btn-cpu').classList.toggle('selected', mode === 'cpu');
  document.getElementById('btn-2p').classList.toggle('selected', mode === '2p');
  const box = document.getElementById('controls-display');
  if (mode === 'cpu') {
    box.innerHTML = `<div><span class="key">↑ ↓</span> &nbsp; Move &nbsp;&nbsp;&nbsp; <span class="key">SPACE</span> &nbsp; Swing</div>`;
  } else {
    box.innerHTML = `
      <div style="margin-bottom:4px;color:#e8c84a;font-weight:bold;">Player 1 (left)</div>
      <div style="margin-bottom:10px;"><span class="key">W / S</span> &nbsp; Move &nbsp;&nbsp;&nbsp; <span class="key">SPACE</span> &nbsp; Swing</div>
      <div style="margin-bottom:4px;color:#4ab8e8;font-weight:bold;">Player 2 (right)</div>
      <div><span class="key">↑ ↓</span> &nbsp; Move &nbsp;&nbsp;&nbsp; <span class="key">ENTER</span> &nbsp; Swing</div>
    `;
  }
}

function updateInstructions() {
  if (gameMode === 'cpu') {
    instrEl.innerHTML = `<span style="color:#e8c84a;">You</span>: <strong>↑ ↓</strong> move &nbsp;|&nbsp; <strong>SPACE</strong> swing &nbsp;|&nbsp; Better timing = faster shot &nbsp;|&nbsp; First to 7 wins`;
  } else {
    instrEl.innerHTML = `<span style="color:#e8c84a;">P1</span>: <strong>W/S</strong> move &nbsp; <strong>SPACE</strong> swing &nbsp;&nbsp;|&nbsp;&nbsp; <span style="color:#4ab8e8;">P2</span>: <strong>↑↓</strong> move &nbsp; <strong>ENTER</strong> swing &nbsp;|&nbsp; First to 7 wins`;
  }
}

function initGame() {
  serving = Math.random() < 0.5 ? 0 : 1;
  gameOver = false;
  feedbacks = [];
  scores = [0, 0];
  document.getElementById('score1').textContent = 0;
  document.getElementById('score2').textContent = 0;
  resetRound();
}

function resetRound() {
  players = [
    { x: 36, y: H/2 - PLAYER_H/2, swing: 0, hitFrame: -1, color: '#e8c84a', racketColor: '#c8a820' },
    { x: W - 36 - PLAYER_W, y: H/2 - PLAYER_H/2, swing: 0, hitFrame: -1, color: '#4ab8e8', racketColor: '#2090c0' }
  ];
  ball = {
    x: W/2, y: H/2,
    vx: (serving === 0 ? 1 : -1) * 4,
    vy: (Math.random() - 0.5) * 4,
    speed: 4,
    trail: [],
    lastHit: -1,
    inPlay: false
  };
  lastSwingTime = [0, 0];
  setTimeout(() => { if (!gameOver) ball.inPlay = true; }, 800);
}

function startGame() {
  overlay.style.display = 'none';
  gameRunning = true;
  updateInstructions();
  initGame();
  if (!loopStarted) { loopStarted = true; requestAnimationFrame(loop); }
}

document.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','Space','Enter'].includes(e.code)) e.preventDefault();
  if (!gameRunning || gameOver) return;
  if (e.code === 'Space') trySwing(0);
  if (e.code === 'Enter' && gameMode === '2p') trySwing(1);
});

document.addEventListener('keyup', (e) => { keys[e.code] = false; });

function trySwing(i) {
  const now = Date.now();
  if (now - lastSwingTime[i] < 300) return;
  const p = players[i];
  const bx = ball.x, by = ball.y;
  const ballApproaching = i === 0 ? ball.vx < 0 : ball.vx > 0;
  const xClose = i === 0
    ? (bx > p.x - 50 && bx < p.x + PLAYER_W + 60)
    : (bx < p.x + PLAYER_W + 50 && bx > p.x - 60);
  const yClose = by > p.y - 30 && by < p.y + PLAYER_H + 30;

  p.swing = 1;

  if (xClose && yClose && ballApproaching && ball.inPlay && ball.lastHit !== i) {
    lastSwingTime[i] = now;
    p.hitFrame = 10;

    const centerY = p.y + PLAYER_H / 2;
    const dist = Math.abs(by - centerY);
    const timing = Math.max(0, 1 - dist / (PLAYER_H / 2 + 30));
    const newSpeed = 5 + timing * 10;

    const dir = i === 0 ? 1 : -1;
    const angle = ((by - centerY) / (PLAYER_H / 2)) * 0.8;
    ball.vx = dir * newSpeed * Math.cos(angle);
    ball.vy = newSpeed * Math.sin(angle) + (by - centerY) * 0.05;
    ball.speed = newSpeed;
    ball.lastHit = i;

    const fx = i === 0 ? p.x + PLAYER_W + 10 : p.x - 60;
    let label, color;
    if (timing > 0.8) { label = 'POWER!'; color = '#ff4444'; }
    else if (timing > 0.5) { label = 'GOOD!'; color = '#ffcc00'; }
    else { label = 'OK'; color = '#aaffaa'; }
    feedbacks.push({ x: fx, y: by, label, color, life: 60 });
  }
}

function updateCPU() {
  const p = players[1];
  const targetY = ball.y - PLAYER_H / 2;
  const diff = targetY - p.y;
  if (Math.abs(diff) > 3.8) p.y += (diff > 0 ? 1 : -1) * 3.8;
  p.y = Math.max(0, Math.min(H - PLAYER_H, p.y));

  if (ball.inPlay && ball.vx > 0 && ball.lastHit !== 1) {
    const bx = ball.x, by = ball.y;
    const xClose = bx > p.x - 55 && bx < p.x + PLAYER_W + 10;
    const yClose = by > p.y - 20 && by < p.y + PLAYER_H + 20;
    if (xClose && yClose) trySwing(1);
  }
}

function update() {
  if (!gameRunning || gameOver) return;

  // P1 movement
  const p1 = players[0];
  if (gameMode === 'cpu') {
    if (keys['ArrowUp'])   p1.y -= PADDLE_SPEED;
    if (keys['ArrowDown']) p1.y += PADDLE_SPEED;
  } else {
    if (keys['KeyW']) p1.y -= PADDLE_SPEED;
    if (keys['KeyS']) p1.y += PADDLE_SPEED;
  }
  p1.y = Math.max(0, Math.min(H - PLAYER_H, p1.y));
  if (p1.swing > 0) p1.swing -= 0.08;
  if (p1.hitFrame > 0) p1.hitFrame--;

  // P2 movement
  const p2 = players[1];
  if (gameMode === '2p') {
    if (keys['ArrowUp'])   p2.y -= PADDLE_SPEED;
    if (keys['ArrowDown']) p2.y += PADDLE_SPEED;
    p2.y = Math.max(0, Math.min(H - PLAYER_H, p2.y));
  } else {
    updateCPU();
  }
  if (p2.swing > 0) p2.swing -= 0.08;
  if (p2.hitFrame > 0) p2.hitFrame--;

  if (!ball.inPlay) return;

  ball.trail.push({ x: ball.x, y: ball.y });
  if (ball.trail.length > 10) ball.trail.shift();

  ball.x += ball.vx;
  ball.y += ball.vy;

  if (ball.y - BALL_R < 0) { ball.y = BALL_R; ball.vy *= -1; }
  if (ball.y + BALL_R > H) { ball.y = H - BALL_R; ball.vy *= -1; }

  feedbacks = feedbacks.filter(f => f.life-- > 0);

  if (ball.x - BALL_R < 0) {
    scores[1]++;
    document.getElementById('score2').textContent = scores[1];
    if (scores[1] >= WIN_SCORE) { endGame(1); return; }
    serving = 1; ball.inPlay = false;
    setTimeout(resetRound, 1200);
  } else if (ball.x + BALL_R > W) {
    scores[0]++;
    document.getElementById('score1').textContent = scores[0];
    if (scores[0] >= WIN_SCORE) { endGame(0); return; }
    serving = 0; ball.inPlay = false;
    setTimeout(resetRound, 1200);
  }
}

function endGame(winner) {
  gameOver = true;
  const colors = ['#e8c84a', '#4ab8e8'];
  const names = gameMode === 'cpu'
    ? (winner === 0 ? 'You Win! 🏆' : 'CPU Wins!')
    : `Player ${winner + 1} Wins! 🏆`;
  overlay.innerHTML = `
    <h1 style="color:${colors[winner]}">${names}</h1>
    <p style="font-size:22px;margin:10px 0;color:#cce5cc;">${scores[0]} — ${scores[1]}</p>
    <div style="display:flex;gap:16px;margin-top:22px;">
      <button class="start-btn" onclick="rematch()">REMATCH</button>
      <button class="ghost-btn" onclick="mainMenu()">MENU</button>
    </div>
  `;
  overlay.style.display = 'flex';
}

function rematch() {
  overlay.style.display = 'none';
  initGame();
}

function mainMenu() {
  gameRunning = false;
  overlay.innerHTML = `
    <h1>🎾 Tennis Pong</h1>
    <p class="subtitle">Better timing = faster ball &nbsp;|&nbsp; First to 7 wins</p>
    <div class="mode-btns">
      <button class="mode-btn ${gameMode==='cpu'?'selected':''}" id="btn-cpu" onclick="selectMode('cpu')">vs Computer</button>
      <button class="mode-btn ${gameMode==='2p'?'selected':''}" id="btn-2p" onclick="selectMode('2p')">2 Players</button>
    </div>
    <div class="controls-box" id="controls-display"></div>
    <button class="start-btn" onclick="startGame()">PLAY</button>
  `;
  overlay.style.display = 'flex';
  selectMode(gameMode);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#2d6a2d';
  ctx.fillRect(0, 0, W, H);

  // Court lines
  ctx.setLineDash([8, 12]);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.setLineDash([]);

  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  ctx.strokeRect(60, 30, W - 120, H - 60);
  ctx.beginPath(); ctx.arc(W/2, H/2, 60, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W/2, 30); ctx.lineTo(W/2, H - 30); ctx.stroke();

  // Ball trail
  for (let i = 0; i < ball.trail.length; i++) {
    const alpha = (i / ball.trail.length) * 0.4;
    const r = BALL_R * (i / ball.trail.length);
    ctx.beginPath();
    ctx.arc(ball.trail[i].x, ball.trail[i].y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 240, 100, ${alpha})`;
    ctx.fill();
  }

  // Players
  for (let i = 0; i < 2; i++) {
    const p = players[i];
    const swing = p.swing * (i === 0 ? 1 : -1) * 18;

    ctx.save();
    ctx.translate(p.x + PLAYER_W / 2, p.y + PLAYER_H / 2);
    ctx.rotate((swing * Math.PI) / 180);

    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.roundRect(-PLAYER_W/2, -PLAYER_H/2, PLAYER_W, PLAYER_H, 6);
    ctx.fill();
    ctx.strokeStyle = p.racketColor;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    for (let j = -PLAYER_H/2 + 10; j < PLAYER_H/2; j += 10) {
      ctx.beginPath();
      ctx.moveTo(-PLAYER_W/2 + 2, j);
      ctx.lineTo(PLAYER_W/2 - 2, j);
      ctx.stroke();
    }
    ctx.restore();

    if (p.hitFrame > 0) {
      const alpha = p.hitFrame / 10;
      ctx.beginPath();
      ctx.arc(i === 0 ? p.x + PLAYER_W + 20 : p.x - 20, p.y + PLAYER_H/2, 25 * alpha, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255, 220, 50, ${alpha})`;
      ctx.lineWidth = 3;
      ctx.stroke();
    }
  }

  // Ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = '#f5f555';
  ctx.fill();
  ctx.strokeStyle = '#c8a820';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(ball.x - 3, ball.y - 3, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();

  // Feedback
  for (const f of feedbacks) {
    const alpha = f.life / 60;
    const yOff = (60 - f.life) * 0.4;
    ctx.font = 'bold 16px Courier New';
    ctx.fillStyle = hexToRgba(f.color, alpha);
    ctx.fillText(f.label, f.x, f.y - yOff);
  }

  // Ready message
  if (gameRunning && !ball.inPlay && !gameOver) {
    ctx.font = 'bold 18px Courier New';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.textAlign = 'center';
    ctx.fillText('Get ready...', W/2, H/2 - 20);
    ctx.textAlign = 'left';
  }
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
